name: Release

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:

permissions:
  contents: write
  packages: write

jobs:
  build-artifacts:
    name: Build release artifacts
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.22.x'
          cache-dependency-path: backend/go.sum
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Build web client
        working-directory: frontend
        run: |
          npm ci
          npm run build
          tar -czf ../ghostwire-client-web.tar.gz -C build .
      - name: Build server binaries
        working-directory: backend
        run: |
          set -eux
          mkdir -p ../dist
          for target in linux/arm64 linux/amd64 windows/amd64; do
            os=${target%/*}
            arch=${target#*/}
            ext=""
            if [ "$os" = "windows" ]; then ext=".exe"; fi
            name="ghostwire-server-${os}-${arch}${ext}"
            CGO_ENABLED=0 GOOS="$os" GOARCH="$arch" go build -trimpath -ldflags="-s -w" -o "../dist/${name}" ./cmd/ghostwire
          done
      - name: Package server binaries
        run: |
          set -eux
          tar -czf ghostwire-server-linux-arm64.tar.gz -C dist ghostwire-server-linux-arm64
          tar -czf ghostwire-server-linux-amd64.tar.gz -C dist ghostwire-server-linux-amd64
          zip -j ghostwire-server-windows-amd64.zip dist/ghostwire-server-windows-amd64.exe
      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ghostwire-release-artifacts
          path: |
            ghostwire-client-web.tar.gz
            ghostwire-server-linux-arm64.tar.gz
            ghostwire-server-linux-amd64.tar.gz
            ghostwire-server-windows-amd64.zip
      - name: Publish GitHub release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: |
            ghostwire-client-web.tar.gz
            ghostwire-server-linux-arm64.tar.gz
            ghostwire-server-linux-amd64.tar.gz
            ghostwire-server-windows-amd64.zip

  container:
    name: Build multi-arch container
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        if: startsWith(github.ref, 'refs/tags/')
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build multi-arch image
        uses: docker/build-push-action@v6
        with:
          context: .
          target: server
          platforms: linux/arm64,linux/amd64
          push: ${{ startsWith(github.ref, 'refs/tags/') }}
          tags: |
            ghcr.io/${{ github.repository_owner }}/ghostwire:${{ github.ref_name }}
            ghcr.io/${{ github.repository_owner }}/ghostwire:latest
